# Render Infrastructure-as-Code (IaC) Configuration File
# Placed inside the Back_end folder - Optimized for Free Tier

services:
  - type: web
    name: smart-hydration-backend
    runtime: docker
    plan: free # Using Render's Free Instance Plan
    envVars:
      - key: DEBUG
        value: "False"
      
      - key: SECRET_KEY
        generateValue: true # Render will automatically generate a secure random string

      - key: ALLOWED_HOSTS
        value: "*"

      # -------------------------------------------------------------
      # DATABASE CONFIGURATION (Managed Postgres Free Tier)
      # -------------------------------------------------------------
      # Links the backend service directly to the PostgreSQL database declared below.
      - key: DATABASE_URL
        fromDatabase:
          name: smart-hydration-db
          property: connectionString

# -----------------------------------------------------------------
# MANAGED POSTGRESQL DATABASE (Persistent Free Tier - 90 Days)
# -----------------------------------------------------------------
databases:
  - name: smart-hydration-db
    plan: free
